<!DOCTYPE html>
<html>
<head>
  <title>Endless Tower Multiplayer</title>
  <style>
    body { margin:0; background:#111; color:#fff; font-family:sans-serif; }
    #ui { position:absolute; top:10px; left:10px; }
    canvas { background:#222; display:block; margin:0 auto; border:2px solid #555; }
  </style>
</head>
<body>
  <div id="ui">
    <span id="timer">Time: 5:00</span> | 
    <span id="level">Level: 1</span> | 
    <span id="players">Players: 0</span>
  </div>
  <canvas id="gameCanvas" width="400" height="600"></canvas>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const socket = io(); // Railway tự map port

    let player = { x:200, y:550, size:20, level:1 };
    let players = {};
    let startTime = Date.now();
    let duration = 5*60*1000;

    socket.on("updatePlayers", (data) => {
      players = data;
      document.getElementById("players").innerText = "Players: " + Object.keys(players).length;
    });

    socket.on("updateTower", (tower) => {
      console.log("Tower updated:", tower);
    });

    function drawPlayers() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for (let id in players) {
        let p = players[id];
        ctx.fillStyle = "cyan";
        ctx.fillRect(p.x, p.y, 20, 20);
        ctx.fillText("Lv " + p.level, p.x, p.y-10);
      }
    }

    function updateTimer() {
      let elapsed = Date.now() - startTime;
      let remaining = duration - elapsed;
      if (remaining <= 0) {
        document.getElementById("timer").innerText = "Time: 0:00";
        ctx.fillStyle = "red";
        ctx.fillText("Game Over", 150, 300);
        return false;
      }
      let minutes = Math.floor(remaining/60000);
      let seconds = Math.floor((remaining%60000)/1000);
      document.getElementById("timer").innerText = 
        "Time: " + minutes + ":" + (seconds<10?"0":"") + seconds;
      return true;
    }

    function gameLoop() {
      if(updateTimer()) {
        drawPlayers();
        requestAnimationFrame(gameLoop);
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp") player.y -= 10;
      if (e.key === "ArrowDown") player.y += 10;
      if (e.key === "ArrowRight") player.x += 10;
      if (e.key === "ArrowLeft") player.x -= 10;
      socket.emit("move", player);
    });

    setInterval(()=>{
      player.level++;
      document.getElementById("level").innerText = "Level: " + player.level;
      socket.emit("nextLevel");
    }, 5000);

    gameLoop();
  </script>
</body>
</html>
